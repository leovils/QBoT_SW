<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Resultados - Admin</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom overrides for the admin dashboard */
        .app-container {
            max-width: 1000px;
        }
        
        .main-card {
            min-height: auto;
            justify-content: flex-start;
            padding: 30px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }
        
        .admin-title h1 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .admin-title p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }
        
        .actions-bar {
            display: flex;
            gap: 12px;
        }
        
        .session-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            margin-bottom: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .session-card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border-color: rgba(130, 87, 229, 0.25);
        }
        
        .session-header {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
        }
        
        .session-id {
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--accent-cyan);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .session-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .session-body {
            padding: 24px;
        }
        
        .response-row {
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
            padding-bottom: 16px;
        }
        
        .response-row:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        
        .response-question {
            font-family: var(--font-heading);
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        
        .question-number {
            background: rgba(130, 87, 229, 0.15);
            color: var(--accent-purple);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .response-content {
            padding-left: 36px;
        }
        
        .text-response-val {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.92rem;
            color: #dcdcf0;
            line-height: 1.5;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word;
        }
        
        .badge-type {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 600;
            margin-left: 8px;
            display: inline-block;
        }
        
        .badge-audio {
            background: rgba(255, 0, 127, 0.15);
            color: var(--accent-pink);
            border: 1px solid rgba(255, 0, 127, 0.25);
        }
        
        .badge-text {
            background: rgba(0, 245, 255, 0.15);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 245, 255, 0.25);
        }
        
        .badge-choice {
            background: rgba(130, 87, 229, 0.15);
            color: var(--accent-purple);
            border: 1px solid rgba(130, 87, 229, 0.25);
        }
        
        .audio-player-container {
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 400px;
        }
        
        .audio-player-container audio {
            height: 36px;
            border-radius: 8px;
        }
        
        .no-data {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
        }
        
        .no-data i {
            font-size: 3rem;
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="glass-bg-elements">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-comments-pie logo-icon"></i>
                <span>QualiQuanti<span>Dashboard</span></span>
            </div>
            <a href="index.html" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Voltar à Entrevista
            </a>
        </header>

        <!-- Dashboard Card -->
        <main class="main-card">
            <div class="admin-header">
                <div class="admin-title">
                    <h1>Respostas Coletadas</h1>
                    <p id="total-sessions-label">Carregando dados da pesquisa...</p>
                </div>
                <div class="actions-bar">
                    <button id="download-zip-btn" class="btn btn-outline" style="border-color: var(--accent-pink); color: var(--accent-pink);" disabled>
                        <i class="fa-solid fa-file-zipper"></i> Baixar Áudios (ZIP)
                    </button>
                    <button id="download-btn" class="btn btn-outline" style="border-color: var(--success); color: var(--success);" disabled>
                        <i class="fa-solid fa-file-excel"></i> Exportar Planilha (CSV)
                    </button>
                    <button id="refresh-btn" class="btn btn-primary">
                        <i class="fa-solid fa-arrows-rotate"></i> Atualizar
                    </button>
                </div>
            </div>

            <!-- Content Area -->
            <div id="dashboard-content">
                <!-- Session Cards rendered dynamically -->
                <div class="no-data">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Buscando dados no servidor...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Supabase JS SDK & Configuration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="supabase-config.js"></script>
    <script>
        // Initialize Supabase Client
        let supabaseClient = null;
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            console.error("Supabase SDK not loaded or config missing.");
        }

        let questionsMap = {}; // Maps question ID to question text
        let currentResults = []; // Stores the loaded responses for exporting

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("refresh-btn").addEventListener("click", loadDashboardData);
            document.getElementById("download-btn").addEventListener("click", downloadCSV);
            document.getElementById("download-zip-btn").addEventListener("click", downloadAllAudiosZip);
            loadDashboardData();
        });

        async function downloadAllAudiosZip() {
            const audioResponses = currentResults.filter(r => r.response_type === "audio" && r.audio_path);
            if (audioResponses.length === 0) {
                alert("Nenhuma gravação de áudio encontrada para baixar.");
                return;
            }

            const zipBtn = document.getElementById("download-zip-btn");
            const originalText = zipBtn.innerHTML;
            zipBtn.disabled = true;
            
            try {
                const zip = new JSZip();
                
                for (let i = 0; i < audioResponses.length; i++) {
                    const resp = audioResponses[i];
                    zipBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Baixando (${i + 1}/${audioResponses.length})...`;
                    
                    const qInfo = questionsMap[resp.question_id] || { text: `Pergunta_${resp.question_id}`, index: "?" };
                    
                    // Gerar URL pública do Supabase Storage
                    const { data } = supabaseClient.storage.from('audio-responses-sw').getPublicUrl(resp.audio_path);
                    const audioUrl = data.publicUrl;
                    
                    // Buscar o arquivo (Fetch) como blob
                    const fileResponse = await fetch(audioUrl);
                    if (!fileResponse.ok) continue;
                    const blob = await fileResponse.blob();
                    
                    // Formatar caminho e nome de arquivo dentro do ZIP
                    const folderName = `Sessao_${resp.session_id}`;
                    const safeQuestionId = resp.question_id.replace(/[^a-zA-Z0-9-_]/g, "_");
                    const filename = `${folderName}/Q${qInfo.index}_${safeQuestionId}.webm`;
                    
                    zip.file(filename, blob);
                }
                
                zipBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Compactando ZIP...`;
                const content = await zip.generateAsync({ type: "blob" });
                
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = `audios_pesquisa_quorum_${new Date().toISOString().slice(0,10)}.zip`;
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
            } catch (error) {
                console.error("Erro ao gerar ZIP:", error);
                alert("Erro ao baixar áudios como ZIP.");
            } finally {
                zipBtn.disabled = false;
                zipBtn.innerHTML = originalText;
            }
        }

        async function downloadAllAudiosZip() {
            const audioResponses = currentResults.filter(r => r.response_type === "audio" && r.audio_path);
            if (audioResponses.length === 0) {
                alert("Nenhuma gravação de áudio encontrada para baixar.");
                return;
            }

            const zipBtn = document.getElementById("download-zip-btn");
            const originalText = zipBtn.innerHTML;
            zipBtn.disabled = true;
            
            try {
                const zip = new JSZip();
                
                for (let i = 0; i < audioResponses.length; i++) {
                    const resp = audioResponses[i];
                    zipBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Baixando (${i + 1}/${audioResponses.length})...`;
                    
                    const qInfo = questionsMap[resp.question_id] || { text: `Pergunta_${resp.question_id}`, index: "?" };
                    
                    // Gerar URL pública do Supabase Storage
                    const { data } = supabaseClient.storage.from('audio-responses-sw').getPublicUrl(resp.audio_path);
                    const audioUrl = data.publicUrl;
                    
                    // Buscar o arquivo (Fetch) como blob
                    const fileResponse = await fetch(audioUrl);
                    if (!fileResponse.ok) continue;
                    const blob = await fileResponse.blob();
                    
                    // Formatar caminho e nome de arquivo dentro do ZIP
                    const folderName = `Sessao_${resp.session_id}`;
                    const safeQuestionId = resp.question_id.replace(/[^a-zA-Z0-9-_]/g, "_");
                    const filename = `${folderName}/Q${qInfo.index}_${safeQuestionId}.webm`;
                    
                    zip.file(filename, blob);
                }
                
                zipBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Compactando ZIP...`;
                const content = await zip.generateAsync({ type: "blob" });
                
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = `audios_pesquisa_quorum_${new Date().toISOString().slice(0,10)}.zip`;
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
            } catch (error) {
                console.error("Erro ao gerar ZIP:", error);
                alert("Erro ao baixar áudios como ZIP.");
            } finally {
                zipBtn.disabled = false;
                zipBtn.innerHTML = originalText;
            }
        }

        function downloadCSV() {
            if (currentResults.length === 0) return;
            
            const headers = ["Sessão ID", "Data/Hora", "ID Pergunta", "Texto da Pergunta", "Tipo de Resposta", "Resposta Coletada", "Link do Áudio"];
            const rows = [headers];
            
            currentResults.forEach(row => {
                const qInfo = questionsMap[row.question_id] || { text: `Pergunta (${row.question_id})`, index: "?" };
                const dateStr = new Date(row.created_at).toLocaleString("pt-BR");
                
                let audioUrl = "";
                if (row.response_type === "audio" && row.audio_path) {
                    const { data } = supabaseClient.storage.from('audio-responses-sw').getPublicUrl(row.audio_path);
                    audioUrl = data.publicUrl;
                }
                
                rows.push([
                    row.session_id,
                    dateStr,
                    row.question_id,
                    qInfo.text,
                    row.response_type,
                    row.text_response || "",
                    audioUrl
                ]);
            });
            
            // Format array to CSV using semicolon separator (Excel standard in Portuguese)
            const csvString = "\uFEFF" + rows.map(e => e.map(val => `"${val.toString().replace(/"/g, '""')}"`).join(";")).join("\r\n");
            
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `respostas_pesquisa_sw_${new Date().toISOString().slice(0,10)}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function loadDashboardData() {
            const contentDiv = document.getElementById("dashboard-content");
            const sessionsLabel = document.getElementById("total-sessions-label");
            
            try {
                // 1. Fetch survey structure if not loaded yet
                if (Object.keys(questionsMap).length === 0) {
                    const surveyRes = await fetch("survey_script.json");
                    if (surveyRes.ok) {
                        const surveyQuestions = await surveyRes.json();
                        surveyQuestions.forEach((q, idx) => {
                            questionsMap[q.id] = {
                                text: q.question,
                                index: idx + 1
                            };
                        });
                    }
                }

                // 2. Fetch results from Supabase Database
                if (!supabaseClient) {
                    throw new Error("Supabase não está configurado.");
                }

                const { data: results, error } = await supabaseClient
                    .from('responses_sw')
                    .select('*')
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                
                currentResults = results || [];
                document.getElementById("download-btn").disabled = currentResults.length === 0;
                
                // Habilitar botão de ZIP apenas se houver pelo menos um áudio cadastrado
                const hasAudios = currentResults.some(r => r.response_type === "audio" && r.audio_path);
                document.getElementById("download-zip-btn").disabled = !hasAudios;
                
                
                if (!results || results.length === 0) {
                    sessionsLabel.innerText = "Nenhuma resposta coletada até o momento.";
                    contentDiv.innerHTML = `
                        <div class="no-data">
                            <i class="fa-solid fa-database"></i>
                            <p>Nenhuma resposta encontrada no banco de dados.</p>
                        </div>
                    `;
                    return;
                }

                // 3. Group by session_id
                const sessions = {};
                results.forEach(row => {
                    if (!sessions[row.session_id]) {
                        sessions[row.session_id] = [];
                    }
                    sessions[row.session_id].push(row);
                });

                const sessionKeys = Object.keys(sessions);
                sessionsLabel.innerText = `${sessionKeys.length} participante(s) responderam à pesquisa.`;

                // 4. Render sessions
                contentDiv.innerHTML = "";
                
                // Sort sessions so the newest one appears first
                sessionKeys.reverse().forEach(sessionId => {
                    const sessionResponses = sessions[sessionId];
                    
                    // Find first timestamp for the session
                    const firstResponseTime = new Date(sessionResponses[0].created_at).toLocaleString("pt-BR");
                    
                    const sessionCard = document.createElement("div");
                    sessionCard.className = "session-card";
                    
                    let responsesHtml = "";
                    sessionResponses.forEach(resp => {
                        const qInfo = questionsMap[resp.question_id] || { text: `Pergunta (${resp.question_id})`, index: "?" };
                        
                        let badgeClass = "badge-text";
                        let badgeLabel = "Escrita";
                        let answerContent = "";

                        if (resp.response_type === "audio") {
                            badgeClass = "badge-audio";
                            badgeLabel = "Áudio";
                            
                            // Generate Supabase Public URL for the audio responses bucket
                            const { data } = supabaseClient.storage.from('audio-responses-sw').getPublicUrl(resp.audio_path);
                            const audioUrl = data.publicUrl;

                            answerContent = `
                                <div class="audio-player-container">
                                    <audio src="${audioUrl}" controls></audio>
                                </div>
                            `;
                        } else if (resp.response_type === "choice") {
                            badgeClass = "badge-choice";
                            badgeLabel = "Survey";
                            answerContent = `<div class="text-response-val">${resp.text_response}</div>`;
                        } else {
                            answerContent = `<div class="text-response-val">${resp.text_response}</div>`;
                        }

                        responsesHtml += `
                            <div class="response-row">
                                <div class="response-question">
                                    <span class="question-number">Q${qInfo.index}</span>
                                    <span>${qInfo.text}</span>
                                    <span class="badge-type ${badgeClass}">${badgeLabel}</span>
                                </div>
                                <div class="response-content">
                                    ${answerContent}
                                </div>
                            </div>
                        `;
                    });

                    sessionCard.innerHTML = `
                        <div class="session-header">
                            <div class="session-id">
                                <i class="fa-solid fa-user-tie"></i>
                                <span>Sessão: ${sessionId}</span>
                            </div>
                            <div class="session-date">
                                <i class="fa-solid fa-calendar-days"></i> ${firstResponseTime}
                            </div>
                        </div>
                        <div class="session-body">
                            ${responsesHtml}
                        </div>
                    `;
                    
                    contentDiv.appendChild(sessionCard);
                });

            } catch (error) {
                console.error("Erro no dashboard:", error);
                sessionsLabel.innerText = "Erro ao carregar dados.";
                contentDiv.innerHTML = `
                    <div class="no-data">
                        <i class="fa-solid fa-triangle-exclamation" style="color: var(--error)"></i>
                        <p>Falha ao carregar as respostas. Verifique a conexão com o Supabase.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
